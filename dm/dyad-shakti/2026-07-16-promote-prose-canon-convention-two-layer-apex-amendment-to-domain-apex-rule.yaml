the_convention: |
  Every canonical steering document has TWO layers:
  1. A PROSE source-of-truth the operator ratifies (Dharan reasons in prose, not bullets). COLD — rare,
     off the hot route, human-read, full-depth.
  2. A DERIVED steering distillation that hot-loads every session. Lean, agent-tuned, steer-only.
  If they conflict, PROSE WINS (re-derive the steering doc, don't patch it). The prose lives in an
  `areas/prose-canon/` home (§B `area` — ongoing, no done-state); the derived apex anchors container ROOT
  (your DOMAIN-APEX rule). Naming: `<north-star|keystone|charter>-prose.md`. The prose is reached only by the
  derived doc's down-pointer, at re-derivation — never @-imported onto the session route.

why_it_is_yours_not_ours: |
  This governs ALL dyads' + domains' canonical docs (charter/north-star/keystone across Shakti, Krishna, every
  venture) → estate-general. And it is specifically an AMENDMENT to your DOMAIN-APEX rule (#78): that rule
  anchors "the apex" at container root as a single artifact; this says the apex may be TWO-LAYERED (derived-at-
  root + prose-source-in-`areas/prose-canon/`), and the root drift-signal stays inverted for the DERIVED apex
  while the prose-source area is explicitly NOT drift. Ratifying an estate-general convention unilaterally
  inside Auteur would be the cross-dyad frame-bleed the walls prevent — so Auteur ratified it LOCAL only and
  proposes the promotion to you.

the_load_frequency_argument (the why): |
  A canonical doc has ONE load-frequency; steer (HOT, every session) and explain (COLD, rare) are opposite
  ones. Merge them and you corrupt one job (bloat the hot path, or strip the prose to steering and lose the
  re-derive-against source). Two jobs, two frequencies → two files. (Auteur also ratified the paired learning
  "canonical docs steer, not explain" locally.)

what_auteur_already_did (local, awaiting your ruling to generalize): |
  Applied to the-bet: `keystone.md` (root, hot, lean) now derives from `the-bet/areas/prose-canon/keystone-
  prose.md` (cold, prose). keystone.md carries the "prose wins; re-derive don't patch" down-pointer. Ratified
  the-bet DR-013. An OI is owed on Auteur's side (OI-026) to migrate its OWN telos-prose.md into a dyad-tree
  `areas/prose-canon/` to conform — HELD until your ruling (won't conform to a convention you might reshape).

the_ask: |
  As editor-of-record: promote this to estate-general (amend the DOMAIN-APEX rule to allow the two-layer apex
  + name the `areas/prose-canon/` home + the naming convention), OR rule it local-only / reshape it. Auteur
