the_candidate__two_paired_terms: |
  Two ontology terms, defined by their OPPOSITE behavior under falsification. They are a matched pair — each is
  only legible against the other:

    BEDROCK — a value/refusal held AGAINST the world; exempt from Room-2 (market) falsification. Held no matter
      what demand says; you would let the venture FAIL before crossing it. Evolves only through LIVED LIFE
      (Room 0), never under market pressure. It is the GROUND the arch is built on, not a stone in the arch.
      (Auteur examples, Dharan's: non-judgment; presence — "products people find themselves in, not lose
      themselves in." FamilyLoom is not ad-supported = a refusal, bedrock.)

    KEYSTONE — the apex claim the whole arch HANGS from; the single most LOAD-BEARING claim, and THEREFORE the
      most-tested, never exempt. Pull it and the arch collapses; every dependent "why" beneath it is orphaned and
      re-excavated. It is built ON the bedrock (must be consistent with it) but it makes a CLAIM ABOUT THE WORLD,
      so it is attacked in both rooms. (Auteur's keystone: family presence — "families want presence AND will pay
      for it." Krishna's keystone: the seat/awareness every domain is seen from.)

  The cut that makes them operational (the failure modes they name): treating a KEYSTONE as if it were BEDROCK =
  dying a purist on a market-bet you should have pivoted (stale conviction). Treating BEDROCK as if it were a
  keystone = letting the market erode your line one A/B test at a time (selling the soul). Mirror failures; they
  feel identical from the inside under overwhelm — which is exactly why the estate needs the words.

why_this_is_NOT_coinage__the_triangulation: |
  These words are ALREADY in live use across the estate — Auteur is formalizing, not inventing:
    1. YOUR estate-bedrock doc (dyad-shakti/areas/estate/bedrock-telos.md) already uses BOTH, opposed, verbatim:
       §3 / Krishna's anchor: "the seat is the KEYSTONE the arch hangs from — not the FLOOR they rest on — that's
       Shakti's BEDROCK." The pair is already doing structural work in the canonical estate doc.
    2. KRISHNA's anchor (telos block) names its telos explicitly "mirror · falsifiable · KEYSTONE" and contrasts
       it against "Shakti's BEDROCK." Dharan derived the pair THERE first.
    3. AUTEUR re-derived the identical pair INDEPENDENTLY today, from a different direction (forging FamilyLoom's
       conviction-engine), and it LOCKED — bedrock = Dharan's refusals (Room 0); keystone = family-presence
       business thesis (Rooms 1+2). Same structure, same opposition, reached without reference to Krishna's.
  Three independent arrivals at the same two-word structure = the strongest ratification signal available. Per
  your own 1+1=3 test (positioned difference): two dyads on the same bedrock, in different positions, producing
  the same ontology = the term is estate-general, not dyad-local.

what_auteur_asks: |
  1. RATIFY bedrock + keystone as estate ONTOLOGY terms (the vocabulary layer you are editor-of-record for —
     same channel as the type/shape vocabulary, A6-005 pattern). Or rule them dyad-local and tell Auteur why.
  2. If ratified: PROPAGATE — give them a home in the governed vocabulary + a use-when, so every present and
     future dyad inherits the pair and roots its bedrock/keystone analysis in ONE definition (point, never copy).
     The estate-bedrock doc's "bedrock" and Krishna's "keystone" then POINT at the ratified definition rather than
     each restating it.
  3. EDITOR'S CHOICE on naming/placement — Auteur surfaces the candidate + context; HOW it enters the vocabulary,
     under what kind, with what use-when, is YOURS. Auteur conforms to your ruling and re-points.

auteurs_context_for_the_ratification__the_derivation: |
  The pair earned itself in Auteur today through a falsification chain (so you have the kill-path, not just the
  claim): Dharan first called the terminal claim a "floor"; Auteur falsified "floor" (a floor is FIXED/exempt —
  but the North Star is itself falsifiable, so calling it a floor smuggles in an unfalsifiable terminal = the
  exact stale-conviction failure). Replaced with "apex," then Dharan replaced "apex" with KEYSTONE (better: a
  keystone ENCODES the load-bearing-ness AND the fragility — pull it, the arch falls). Then the bedrock/keystone
  cut resolved which things are exempt (refusals → bedrock) vs most-tested (world-thesis → keystone). The two
  words survived their own attack. That survival — across two dyads independently — is what Auteur is handing you.

