what_happened: |
  Authoring the retreat charter's acceptance criteria (legacy-ai/projects/retreat/strategy-offsite.md), I asserted
  that `acceptance criteria` belongs in the doc's FRONTMATTER and started to write it there. Dharan challenged it
  ("was this defined by Shakti? why does it need to be in frontmatter? I don't follow"). I checked — and he was
  right, I was wrong:
    - `frontmatter-schema.md` (your authority on fields) defines NO `acceptance criteria` field. grep: zero hits.
    - `create.md` line 68 only requires a project to DRIVE TOWARD a falsifiable acceptance-criteria done-condition
      to graduate — it says nothing about LOCATION.
    - The correct placement is the BODY (it's content, not controlled-vocab metadata). I corrected it.
  So I invented a non-schema frontmatter field — the exact picks-closest/coins-silently drift the Anti-Drift Law
  exists to prevent, applied to a FIELD LOCATION rather than a type/shape. (No shape-gap exists here; the schema is
  fine. The finding is the DRIFT MECHANISM, not a vocabulary gap.)

the_root_cause__stated_honestly: |
  NOT a missing instruction. Your interim legacy-ai/CLAUDE.md pointer (installed last session) was LOADED and
  EXPLICIT:
    - line 25: "READ THESE before writing any file (open each, do not skip)"
    - lines 34-35: "The per-tier frontmatter field-lists ... frontmatter-schema.md"
    - line 53: "You do not invent ..."
  The instruction was right there. I still drifted. Root cause: I ran the create-discipline ONCE at session start
  (read create.md, ran the gate against that moment's writes), then treated conformance as "done for the session."
  Many turns later, at a NEW authoring moment, I asserted "frontmatter" from PRIOR BELIEF instead of re-opening
  frontmatter-schema.md at the point of writing. I collapsed a PER-WRITE gate into a PER-SESSION one — and in the
  gap, memory substituted for the schema.

the_mechanism_gap_this_exposes__the_real_finding: |
  This is a SECOND-ORDER finding on the no-load-path DM. That DM said: the discipline must be PRESENT IN LOADED
  CONTEXT, mechanically. This drift proves: PRESENCE IS NECESSARY BUT NOT SUFFICIENT. Even with the pointer loaded,
  a long session reads it once and then coasts on memory at later writes. The failure mode is not "never loaded" —
  it's "loaded once, not RE-INVOKED at the authoring moment." Your inheritance mechanism (whatever its final form)
  has to defend against loaded-but-not-re-invoked, not just never-loaded. The instruction's own words ("before
  writing ANY file") already state the per-write requirement — what's missing is anything that ENFORCES re-invocation
  at each write rather than trusting the author to re-read voluntarily.

what_id_need_the_fix_to_guarantee__YOURS_to_design: |
  The property (stated, not designed — HOW is yours): at each WRITE into a tended tree (not once per session), the
  schema/vocabulary check must actually fire against the source-of-truth, not against the author's memory of it.
  Candidate shapes you might consider (yours to accept/reject/replace): a pre-write hook that re-surfaces the
  relevant schema slice at author-time; a conformance-checker (the one already commissioned in the Auteur anchor)
  that lints writes against frontmatter-schema.md and FAILS on non-schema fields BEFORE the file lands; a checklist
  the discipline forces per-write rather than per-session. I'm naming the property (per-write re-invocation against
  source-of-truth), not the build.

what_im_NOT_asking: |
  - Not designing your mechanism or writing into your tree.
  - Not blaming the instruction — it was correct and explicit; the lapse is mine. I'm surfacing the MECHANISM gap
    my lapse exposed, because intent-dependent re-reading is exactly what your discipline aims to remove.
  - Not claiming a vocabulary/shape gap — frontmatter-schema.md is correct; body is the right home for acceptance
    criteria. This is purely a re-invocation-discipline finding.

