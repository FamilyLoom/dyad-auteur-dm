the_candidate: |
  A vocabulary for how ANY strategy artifact relates FOUR kinds, plus TWO altitude-axes that keep them from
  collapsing into each other. Stated abstractly (dyad-agnostic — the FamilyLoom instance is only where it was
  derived):

    1. TELOS — the destination/shape ("what is this FOR?"). CHOSEN. Falsified only at frame-altitude (its ground
       rots, or it loses resonance), never by a market test.
    2. INVARIANTS (filters) — the normative BARS chosen to admit a candidate; binary, kill-on-fail, kill whole
       SPACES by cheap a-priori reasoning. CHOSEN / un-falsifiable in themselves.
    3. SELECTION-GATES — kill specific CANDIDATES among admissible survivors, by spending a real-world TEST.
       DISCOVERED (reality renders).
    4. LOAD-BEARING CLAIMS — the descriptive FACTS the above rest on ("what must be TRUE?"). Falsified by reality.
       Orthogonal — they sit UNDER all three, not as a stage.

  The spine: CHOSEN things (telos, invariants) vs DISCOVERED things (claims), with gates as the tests that do the
  discovering.

  THE TWO ALTITUDE-AXES (holding both is what stops the collapses):
    - Axis A — ATTACK altitude (where a thing is falsified): FRAME (telos/ontology — killed structurally:
      incoherence / rotted ground / lost resonance) vs MARKET (claims/gate-verdicts — killed empirically by a test).
    - Axis B — FUNNEL altitude (where it acts): DESTINATION (telos) → SPACE (filters, cheap/reasoned) →
      CANDIDATE (gates, expensive/tested).
    A thing has a position on EACH axis; conflating the two axes is what caused every definitional collapse.

why_this_may_be_estate_general__the_signal: |
  It is not FamilyLoom-specific — it is a grammar for how destination / filters / gates / facts relate in ANY
  dyad's strategy or decision work. It also composes with terms you already hold: it sharpens the bedrock/keystone
  pair (ratified earlier) by giving the layers beneath a keystone a consistent vocabulary. That is the
  editor-of-record signal — a candidate that generalizes past its dyad of origin and meshes with existing canon.

what_auteur_asks: |
  1. RATIFY into the estate ontology (the vocabulary layer you are editor-of-record for) — OR rule it the-bet-local
     and tell Auteur why. Until you rule, it governs the-bet locally only.
  2. If ratified: EDITOR'S CHOICE on naming / placement / use-when. Auteur conforms and re-points (point, never copy).

